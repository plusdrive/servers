<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlusDrive Servers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: #0f172a; 
      color: #f8fafc; 
      padding: 40px 20px; 
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    .nav-back { margin-bottom: 24px; }
    .nav-back a { color: #38bdf8; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
    .nav-back a:hover { text-decoration: underline; }

    header { text-align: center; margin-bottom: 35px; }
    header h1 { font-size: 2.2rem; color: #38bdf8; margin-bottom: 8px; }
    header p { color: #94a3b8; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }

    .card { 
      background: #1e293b; 
      border-radius: 12px; 
      padding: 24px; 
      border: 1px solid #334155;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .card h2 { color: #38bdf8; font-size: 1.2rem; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px; }

    .spec-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
    .spec-item .label { color: #94a3b8; }
    .spec-item .value { color: #f1f5f9; font-weight: 600; }

    .status-card { text-align: center; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .status-badge { 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      background: #064e3b; 
      color: #34d399; 
      padding: 8px 16px; 
      border-radius: 20px; 
      font-size: 0.9rem; 
      font-weight: 600; 
    }
    .pulse-dot { 
      width: 8px; 
      height: 8px; 
      background: #34d399; 
      border-radius: 50%; 
      box-shadow: 0 0 8px #34d399; 
    }

    footer { text-align: center; color: #64748b; font-size: 0.85rem; margin-top: 40px; }
  </style>
</head>
<body>
